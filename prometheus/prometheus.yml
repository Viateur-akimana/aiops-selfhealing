global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: techstream-local
    environment: production

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: techstream_app
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets: ['web_app:5000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: techstream-web

  - job_name: node_exporter
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
